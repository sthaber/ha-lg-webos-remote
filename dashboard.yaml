# Dashboard for the entities created by lg_webos_remote.yaml.
#
# Used in two ways:
# 1. As a YAML-mode dashboard, registered via `lovelace:` in
#    configuration.yaml (see the project README for the snippet).
# 2. As a snippet to paste — extract the contents of `views[0]` and
#    paste it into a dashboard view's raw YAML editor.
#
# Adjust entity_ids if your install differs.

views:
  - type: sections
    title: TV
    icon: mdi:television
    sections:
      - type: grid
        cards:
          - type: heading
            heading: LG webOS TV
          - type: tile
            entity: media_player.lg_webos_tv
            name: Power
            icon: mdi:power
            tap_action:
              action: toggle
          - type: tile
            entity: select.lg_webos_tv_power_saving_step
            name: Power Saving Step
          - type: tile
            entity: switch.lg_webos_tv_screen
            name: Screen
            features:
              - type: toggle
          - type: tile
            entity: switch.lg_webos_tv_eye_comfort_mode
            name: Eye Comfort Mode
            features:
              - type: toggle
          - type: tile
            entity: select.lg_webos_tv_hdmi_input
            name: HDMI Input
